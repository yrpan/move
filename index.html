<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> <title>Move Around · Activity Reminder</title> <style> * { user-select: none; box-sizing: border-box; } body { font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif; margin: 0; min-height: 100vh; background: #eef2f5; display: flex; align-items: center; justify-content: center; padding: 20px; } .app-card { max-width: 520px; width: 100%; background: #fefefe; border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2); overflow: hidden; transition: all 0.2s ease; border: 1px solid rgba(0,0,0,0.05); } .inner { padding: 24px 22px 28px 22px; } h2 { margin: 0 0 16px 0; font-size: 1.9rem; font-weight: 500; color: #1e4663; text-align: center; letter-spacing: -0.2px; display: flex; align-items: center; justify-content: center; gap: 10px; } h2 span { font-size: 1.8rem; } .status-area { background: #f9fcff; border-radius: 40px; padding: 18px 16px; margin-bottom: 24px; box-shadow: inset 0 1px 3px #0001, 0 2px 4px #fff8; border: 1px solid #e2edf7; } #progressWrapper { position: relative; width: 100%; height: 52px; background-color: #e9f0f5; border-radius: 40px; overflow: hidden; box-shadow: inset 0 1px 4px rgba(0,0,0,0.1); } #progressFill { width: 0%; height: 100%; background: linear-gradient(135deg, #6fc3df, #3b9bc5); border-radius: 40px; transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); box-shadow: 0 0 6px rgba(59,155,197,0.3); } #timerText { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; font-family: monospace, 'Segoe UI', system-ui; color: #0a2f44; text-shadow: 0 1px 2px white; letter-spacing: 0.5px; pointer-events: none; background: transparent; backdrop-filter: brightness(1.02); } .controls { display: flex; gap: 16px; justify-content: center; margin-top: 8px; } button { padding: 10px 28px; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 60px; cursor: pointer; background: #eef2f6; color: #1e3b4f; transition: all 0.15s ease; font-family: inherit; box-shadow: 0 1px 2px rgba(0,0,0,0.05); min-width: 110px; } button:hover { background: #e1e8ef; transform: scale(0.97); box-shadow: 0 1px 1px rgba(0,0,0,0.05); } button.primary { background: #2c7cb6; color: white; box-shadow: 0 3px 8px rgba(44,124,182,0.3); } button.primary:hover { background: #236b9e; transform: scale(0.97); } button.stop { background: #b8735c; color: white; box-shadow: 0 3px 8px rgba(184,115,92,0.3); } button.stop:hover { background: #a35e48; } footer { text-align: center; font-size: 0.7rem; color: #8da3b5; margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2edf4; } </style> </head> <body> <div class="app-card"> <div class="inner"> <h2> <span>🕒</span> Move Around </h2> <div class="status-area"> <div id="progressWrapper"> <div id="progressFill"></div> <div id="timerText">Next reminder in: 30m 00s</div> </div> </div> <div class="controls"> <button id="toggleBtn" class="primary">Start</button> <button id="closeBtn">Close</button> </div> <footer></footer> </div> </div> <script> (function() { const TOTAL_SECONDS = 1800; let timerId = null; let secondsLeft = TOTAL_SECONDS; let running = false; let alertActive = false; let audioCtx = null; const toggleBtn = document.getElementById('toggleBtn'); const closeBtn = document.getElementById('closeBtn'); const timerTextDiv = document.getElementById('timerText'); const progressFill = document.getElementById('progressFill'); function updateDisplay() { let safeSeconds = Math.max(0, secondsLeft); const mins = Math.floor(safeSeconds / 60); const secs = safeSeconds % 60; const formattedSecs = String(secs).padStart(2, '0'); timerTextDiv.innerHTML = `Next reminder in: ${mins}m ${formattedSecs}s`; const elapsed = TOTAL_SECONDS - safeSeconds; let percent = (elapsed / TOTAL_SECONDS) * 100; percent = Math.min(100, Math.max(0, percent)); progressFill.style.width = `${percent}%`; } function playBeep() { if (!audioCtx) { console.warn("Audio context not ready, skip beep"); return; } if (audioCtx.state === 'closed') return; try { const now = audioCtx.currentTime; const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); oscillator.type = 'sine'; oscillator.frequency.value = 880; gainNode.gain.value = 0.25; oscillator.connect(gainNode); gainNode.connect(audioCtx.destination); oscillator.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.4); oscillator.stop(now + 0.35); } catch (err) { console.warn("beep error:", err); } } function initAndResumeAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { console.warn("Web Audio API not supported, no beep"); return false; } } if (audioCtx.state === 'suspended') { audioCtx.resume().catch(e => console.warn("audio resume failed", e)); } return true; } function tick() { if (alertActive) return; if (!running) return; secondsLeft--; updateDisplay(); if (secondsLeft <= 0) { alertActive = true; if (timerId) { clearInterval(timerId); timerId = null; } running = false; if (audioCtx && (audioCtx.state === 'running' || audioCtx.state === 'suspended')) { if (audioCtx.state === 'suspended') { audioCtx.resume().then(() => playBeep()).catch(() => playBeep()); } else { playBeep(); } } else { if (audioCtx && audioCtx.state === 'closed') { } } alert("⏰ TIME TO MOVE AROUND! ⏰\n\nStand up, stretch, take a short walk."); secondsLeft = TOTAL_SECONDS; updateDisplay(); running = true; timerId = setInterval(tick, 1000); toggleBtn.innerHTML = "Stop"; toggleBtn.classList.remove("primary"); toggleBtn.classList.add("stop"); alertActive = false; } } function toggleTimer() { if (alertActive) return; if (running) { if (timerId) { clearInterval(timerId); timerId = null; } running = false; toggleBtn.innerHTML = "Start"; toggleBtn.classList.remove("stop"); toggleBtn.classList.add("primary"); } else { secondsLeft = TOTAL_SECONDS; updateDisplay(); initAndResumeAudio(); if (timerId) { clearInterval(timerId); timerId = null; } running = true; timerId = setInterval(tick, 1000); toggleBtn.innerHTML = "Stop"; toggleBtn.classList.remove("primary"); toggleBtn.classList.add("stop"); } } function stopAndClose() { if (timerId) { clearInterval(timerId); timerId = null; } running = false; alertActive = false; try { window.close(); } catch(e) { toggleBtn.innerHTML = "Start"; toggleBtn.classList.remove("stop"); toggleBtn.classList.add("primary"); alert("Timer stopped. You can manually close this tab."); } } function initUI() { secondsLeft = TOTAL_SECONDS; running = false; if (timerId) { clearInterval(timerId); timerId = null; } updateDisplay(); toggleBtn.innerHTML = "Start"; toggleBtn.classList.add("primary"); toggleBtn.classList.remove("stop"); toggleBtn.addEventListener('click', toggleTimer); closeBtn.addEventListener('click', stopAndClose); } window.addEventListener('beforeunload', function() { if (timerId) { clearInterval(timerId); } if (audioCtx && audioCtx.state !== 'closed') { audioCtx.suspend(); } }); if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initUI); } else { initUI(); } })(); </script> </body> </html>
